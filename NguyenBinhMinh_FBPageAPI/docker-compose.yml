version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  webhook-service:
    build:
      context: ..
      dockerfile: NguyenBinhMinh_FBPageAPI/Dockerfile
    container_name: webhook-service
    depends_on:
      - kafka
    ports:
      - "3001:3001"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Kafka__BootstrapServers: kafka:29092
      Kafka__TopicRawEvents: raw_events
      FacebookWebhook__VerifyToken: my_verify_token
      FacebookWebhook__AppSecret: "416fc21a8eae033420291c372add7a65"

  core-service:
    build:
      context: ..
      dockerfile: CoreServices/Dockerfile
    container_name: core-service
    depends_on:
      - kafka
    ports:
      - "3002:3002"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Kafka__BootstrapServers: kafka:29092
      Kafka__TopicRawEvents: raw_events
      Kafka__TopicReplyCommands: reply_commands
      Kafka__CoreConsumerGroupId: core-service

  backend-service:
    build:
      context: ..
      dockerfile: BackendAPI/Dockerfile
    container_name: backend-service
    depends_on:
      - kafka
      # - sqlserver
    ports:
      - "3000:3000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Kafka__BootstrapServers: kafka:29092
      Kafka__TopicReplyCommands: reply_commands
      Kafka__TopicSendRetry: send_retry
      Kafka__TopicSendFailed: send_failed
